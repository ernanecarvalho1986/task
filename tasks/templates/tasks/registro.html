<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; padding: 36px; width: 100%; max-width: 420px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; color: #111; margin-bottom: 24px; text-align: center; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #229ED9; }
    button { width: 100%; background: #229ED9; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1a8bbf; }
    .erro { background: #fff0f0; color: #c00; padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .link { text-align: center; margin-top: 14px; font-size: 13px; color: #888; }
    .link a { color: #229ED9; text-decoration: none; font-weight: 600; }
    .dica { background: #e8f4fb; border-left: 3px solid #229ED9; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: #333; line-height: 1.6; }
    .dica strong { color: #229ED9; }
    .opcional { font-size: 11px; color: #aaa; font-weight: normal; margin-left: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ Cadastro</h1>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <label>Usuário</label>
      <input name="username" placeholder="Escolha um usuário" required autofocus>
      <label>Senha</label>
      <input name="password" type="password" placeholder="Escolha uma senha" required>

      <label>Telegram Chat ID <span class="opcional">(opcional — para receber alertas)</span></label>
      <div class="dica">
        <strong>Como obter seu Chat ID:</strong><br>
        1. Abra o Telegram e pesquise por <strong>@userinfobot</strong><br>
        2. Envie qualquer mensagem para ele<br>
        3. Ele responderá com seu <strong>Id:</strong> (ex: 123456789)<br>
        4. Cole o número aqui
      </div>
      <input name="telegram_chat_id" placeholder="Ex: 123456789">

      <button type="submit">Cadastrar</button>
    </form>
    <div class="link">Já tem conta? <a href="{% url 'login' %}">Entrar</a></div>
  </div>
</body>
</html>
